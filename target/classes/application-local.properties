spring.application.name=CycleCare

spring.datasource.url=jdbc:mysql://localhost:3306/cyclecare?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=change_me
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.thymeleaf.cache=false
spring.mvc.hiddenmethod.filter.enabled=true

server.servlet.session.timeout=45m
server.error.whitelabel.enabled=false

cyclecare.security.remember-me-key=local-development-key
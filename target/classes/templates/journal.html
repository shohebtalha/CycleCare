<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Journal', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <div class="eyebrow">Daily journal</div>
            <h1>Symptoms, emotions, and observations</h1>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="surface h-100">
                <form th:action="@{/journal}" th:object="${journalEntryDto}" method="post" class="vstack gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div>
                        <label class="form-label" for="entryDate">Date</label>
                        <input id="entryDate" th:field="*{entryDate}" type="date" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{entryDate}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="physicalSymptoms">Physical symptoms</label>
                        <textarea id="physicalSymptoms" th:field="*{physicalSymptoms}" class="form-control" rows="3"></textarea>
                        <div class="invalid-copy" th:errors="*{physicalSymptoms}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="emotionalState">Emotional state</label>
                        <textarea id="emotionalState" th:field="*{emotionalState}" class="form-control" rows="3"></textarea>
                        <div class="invalid-copy" th:errors="*{emotionalState}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="observations">Personal observations</label>
                        <textarea id="observations" th:field="*{observations}" class="form-control" rows="4"></textarea>
                        <div class="invalid-copy" th:errors="*{observations}"></div>
                    </div>
                    <button class="btn btn-primary" type="submit">
                        <i data-lucide="save"></i>
                        Save journal
                    </button>
                </form>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="surface">
                <div class="section-title">
                    <i data-lucide="book-open"></i>
                    Journal history
                </div>
                <div class="timeline">
                    <div class="timeline-item" th:each="entry : ${entries}">
                        <strong th:text="${entry.entryDate}">2026-06-22</strong>
                        <p class="mb-1" th:text="${entry.physicalSymptoms}">Physical notes</p>
                        <p class="mb-1 text-secondary" th:text="${entry.emotionalState}">Emotional notes</p>
                        <p class="mb-0 text-secondary" th:text="${entry.observations}">Observations</p>
                    </div>
                    <div class="empty-state" th:if="${#lists.isEmpty(entries)}">No journal entries yet.</div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>

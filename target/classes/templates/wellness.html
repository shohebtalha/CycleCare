<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Wellness', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <div class="eyebrow">Wellness</div>
            <h1>Nutrition, exercise, water, and sleep</h1>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="surface h-100">
                <div class="section-title">
                    <i data-lucide="apple"></i>
                    <span th:text="${phase.label + ' phase nutrition'}">Phase nutrition</span>
                </div>
                <div class="info-pair">
                    <span>Recommended foods</span>
                    <p th:text="${nutrition.recommendedFoods}">Foods</p>
                </div>
                <div class="info-pair">
                    <span>Foods to avoid</span>
                    <p th:text="${nutrition.foodsToAvoid}">Foods</p>
                </div>
                <div class="info-pair">
                    <span>Daily tips</span>
                    <p th:text="${nutrition.dailyTips}">Tips</p>
                </div>
                <p class="text-secondary" th:text="${nutrition.explanation}">Explanation</p>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="surface h-100">
                <div class="section-title">
                    <i data-lucide="dumbbell"></i>
                    Exercise recommendations
                </div>
                <div class="list-row align-items-start" th:each="exercise : ${exercises}">
                    <div>
                        <strong th:text="${exercise.title}">Walk</strong>
                        <div class="text-secondary small">
                            <span th:text="${exercise.exerciseType.label}">Yoga</span>
                            <span> | </span>
                            <span th:text="${exercise.intensity}">Low</span>
                            <span> | </span>
                            <span th:text="${exercise.durationMinutes + ' min'}">20 min</span>
                        </div>
                        <p class="mb-0 text-secondary" th:text="${exercise.description}">Description</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mt-1">
        <div class="col-lg-6">
            <div class="surface h-100">
                <div class="section-title">
                    <i data-lucide="droplets"></i>
                    Water intake
                </div>
                <p class="large-copy"><span th:text="${waterToday}">0</span> ml today</p>
                <form th:action="@{/water}" th:object="${waterLogDto}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-6">
                        <label class="form-label" for="waterDate">Date</label>
                        <input id="waterDate" th:field="*{entryDate}" type="date" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{entryDate}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="amountMl">Amount (ml)</label>
                        <input id="amountMl" th:field="*{amountMl}" type="number" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{amountMl}"></div>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">
                            <i data-lucide="plus"></i>
                            Log water
                        </button>
                    </div>
                </form>
                <div class="mini-history mt-3">
                    <span th:each="log : ${waterLogs}" th:text="${log.entryDate + ': ' + log.amountMl + ' ml'}">Log</span>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="surface h-100">
                <div class="section-title">
                    <i data-lucide="moon"></i>
                    Sleep tracker
                </div>
                <p class="large-copy"><span th:text="${#numbers.formatDecimal(sleepAverage, 1, 1)}">0.0</span> hour weekly average</p>
                <form th:action="@{/sleep}" th:object="${sleepLogDto}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-4">
                        <label class="form-label" for="sleepDate">Date</label>
                        <input id="sleepDate" th:field="*{entryDate}" type="date" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{entryDate}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="hours">Hours</label>
                        <input id="hours" th:field="*{hours}" type="number" step="0.5" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{hours}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="quality">Quality</label>
                        <select id="quality" th:field="*{quality}" class="form-select">
                            <option th:each="quality : ${sleepQualities}" th:value="${quality}" th:text="${quality.label}">Good</option>
                        </select>
                        <div class="invalid-copy" th:errors="*{quality}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="sleepNotes">Notes</label>
                        <textarea id="sleepNotes" th:field="*{notes}" class="form-control" rows="2"></textarea>
                        <div class="invalid-copy" th:errors="*{notes}"></div>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">
                            <i data-lucide="plus"></i>
                            Log sleep
                        </button>
                    </div>
                </form>
                <div class="mini-history mt-3">
                    <span th:each="log : ${sleepLogs}" th:text="${log.entryDate + ': ' + log.hours + 'h ' + log.quality.label}">Log</span>
                </div>
            </div>
        </div>
    </div>
</section>
</html>

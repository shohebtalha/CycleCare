<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Login', ~{::section})}">
<section class="auth-wrap">
    <div class="auth-panel">
        <div class="mb-4">
            <div class="eyebrow">Welcome back</div>
            <h1>Sign in to CycleCare</h1>
        </div>

        <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>
        <div class="alert alert-warning" th:if="${param.expired}">Your session expired. Please sign in again.</div>
        <div class="alert alert-info" th:if="${param.logout}">You have been logged out.</div>

        <form th:action="@{/login}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required autofocus>
            </div>
            <div>
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <label class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember-me">
                    <span class="form-check-label">Remember me</span>
                </label>
                <a th:href="@{/forgot-password}">Forgot password?</a>
            </div>
            <button class="btn btn-primary btn-lg" type="submit">
                <i data-lucide="log-in"></i>
                Sign in
            </button>
        </form>
        <p class="mt-4 mb-0 text-secondary">New here? <a th:href="@{/register}">Create an account</a>.</p>
    </div>
</section>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Forgot Password', ~{::section})}">
<section class="auth-wrap">
    <div class="auth-panel">
        <div class="mb-4">
            <div class="eyebrow">Account recovery</div>
            <h1>Reset password</h1>
        </div>
        <form th:action="@{/forgot-password}" th:object="${forgotPasswordDto}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label class="form-label" for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" class="form-control" required>
                <div class="invalid-copy" th:errors="*{email}"></div>
            </div>
            <button class="btn btn-primary btn-lg" type="submit">
                <i data-lucide="key-round"></i>
                Create reset link
            </button>
        </form>
        <div class="alert alert-light mt-4" th:if="${resetLink}">
            Development reset link:
            <a th:href="@{${resetLink}}" th:text="${resetLink}">Reset link</a>
        </div>
        <p class="mt-4 mb-0 text-secondary"><a th:href="@{/login}">Back to login</a></p>
    </div>
</section>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Reset Password', ~{::section})}">
<section class="auth-wrap">
    <div class="auth-panel">
        <div class="mb-4">
            <div class="eyebrow">Secure reset</div>
            <h1>Choose a new password</h1>
        </div>
        <form th:action="@{/reset-password}" th:object="${resetPasswordDto}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input th:field="*{token}" type="hidden">
            <div class="invalid-copy" th:errors="*{token}"></div>
            <div>
                <label class="form-label" for="password">New password</label>
                <input id="password" th:field="*{password}" type="password" class="form-control" required>
                <div class="invalid-copy" th:errors="*{password}"></div>
            </div>
            <div>
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" class="form-control" required>
                <div class="invalid-copy" th:errors="*{confirmPassword}"></div>
                <div class="invalid-copy" th:errors="*{passwordMatching}"></div>
            </div>
            <button class="btn btn-primary btn-lg" type="submit">
                <i data-lucide="shield-check"></i>
                Update password
            </button>
        </form>
    </div>
</section>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title + ' | CycleCare'}">CycleCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<nav class="navbar navbar-expand-lg sticky-top app-nav">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <span class="brand-mark">C</span>
            <span>CycleCare</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="mainNav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0" sec:authorize="isAuthenticated()">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cycles}">Cycle</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/symptoms}">Symptoms</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/moods}">Moods</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/wellness}">Wellness</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/calendar}">Calendar</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/analytics}">Analytics</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/reports}">Reports</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <button id="themeToggle" class="btn btn-icon" type="button" title="Toggle dark mode">
                    <i data-lucide="moon"></i>
                </button>
                <a class="btn btn-outline-primary btn-sm" sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
                <a class="btn btn-primary btn-sm" sec:authorize="isAnonymous()" th:href="@{/register}">Register</a>
                <a class="btn btn-outline-secondary btn-sm" sec:authorize="isAuthenticated()" th:href="@{/profile}">
                    <i data-lucide="user"></i>
                    <span th:text="${currentUser != null ? currentUser.name : 'Profile'}">Profile</span>
                </a>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-danger btn-sm" type="submit" title="Logout">
                        <i data-lucide="log-out"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="container-fluid app-shell">
    <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${success}">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:replace="${content}"></div>
</main>

<footer class="app-footer">
    <span>CycleCare is an educational tracking tool, not a medical diagnostic tool.</span>
    <span th:text="${currentYear}">2026</span>
</footer>
<a th:href="@{/assistant}" class="ai-floating-button">

    <span class="ai-tooltip">
        CycleCare AI
    </span>

    <i data-lucide="bot"></i>

</a>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>

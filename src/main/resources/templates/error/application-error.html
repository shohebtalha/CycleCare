<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Error', ~{::section})}">
<section class="narrow-page">
    <div class="surface p-4">
        <div class="eyebrow">Something needs attention</div>
        <h1>CycleCare could not complete that action</h1>
        <p class="text-secondary" th:text="${errorMessage}">An application error occurred.</p>
        <a class="btn btn-primary" th:href="@{/dashboard}">
            <i data-lucide="layout-dashboard"></i>
            Back to dashboard
        </a>
    </div>
</section>
</html>

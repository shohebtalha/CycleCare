<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Profile', ~{::section})}">
<section class="narrow-page">
    <div class="page-header">
        <div>
            <div class="eyebrow">Profile</div>
            <h1>Personal details</h1>
        </div>
    </div>
    <div class="surface">
        <form th:action="@{/profile}" th:object="${profileDto}" method="post" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="col-12">
                <label class="form-label" for="name">Name</label>
                <input id="name" th:field="*{name}" class="form-control" required>
                <div class="invalid-copy" th:errors="*{name}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="age">Age</label>
                <input id="age" th:field="*{age}" type="number" class="form-control">
                <div class="invalid-copy" th:errors="*{age}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="height">Height (cm)</label>
                <input id="height" th:field="*{height}" type="number" step="0.1" class="form-control">
                <div class="invalid-copy" th:errors="*{height}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="weight">Weight (kg)</label>
                <input id="weight" th:field="*{weight}" type="number" step="0.1" class="form-control">
                <div class="invalid-copy" th:errors="*{weight}"></div>
            </div>
            <div class="col-12">
                <label class="form-label" for="activityLevel">Activity level</label>
                <select id="activityLevel" th:field="*{activityLevel}" class="form-select">
                    <option th:each="level : ${activityLevels}" th:value="${level}" th:text="${level.label}">Moderate</option>
                </select>
                <div class="invalid-copy" th:errors="*{activityLevel}"></div>
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">
                    <i data-lucide="save"></i>
                    Save profile
                </button>
            </div>
        </form>
    </div>
</section>
</html>

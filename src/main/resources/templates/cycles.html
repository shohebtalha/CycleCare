<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Cycle Tracking', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <div class="eyebrow">Cycle tracking</div>
            <h1>Period prediction setup</h1>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="surface h-100">
                <form th:action="@{/cycles}" th:object="${cycleDto}" method="post" class="vstack gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div>
                        <label class="form-label" for="lastPeriodStartDate">Last period start date</label>
                        <input id="lastPeriodStartDate" th:field="*{lastPeriodStartDate}" type="date" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{lastPeriodStartDate}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="averageCycleLength">Average cycle length</label>
                        <input id="averageCycleLength" th:field="*{averageCycleLength}" type="number" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{averageCycleLength}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="averagePeriodDuration">Average period duration</label>
                        <input id="averagePeriodDuration" th:field="*{averagePeriodDuration}" type="number" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{averagePeriodDuration}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="notes">Notes</label>
                        <textarea id="notes" th:field="*{notes}" class="form-control" rows="3"></textarea>
                        <div class="invalid-copy" th:errors="*{notes}"></div>
                    </div>
                    <button class="btn btn-primary" type="submit">
                        <i data-lucide="save"></i>
                        Save cycle
                    </button>
                </form>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="surface mb-4" th:if="${prediction != null}">
                <div class="section-title">
                    <i data-lucide="calendar-heart"></i>
                    Current prediction
                </div>
                <div class="metric-grid compact">
                    <div class="metric-card">
                        <span>Cycle day</span>
                        <strong th:text="${prediction.currentCycleDay}">1</strong>
                    </div>
                    <div class="metric-card">
                        <span>Next period</span>
                        <strong th:text="${prediction.nextPeriodDate}">2026-07-01</strong>
                    </div>
                    <div class="metric-card">
                        <span>Ovulation</span>
                        <strong th:text="${prediction.ovulationDate}">2026-06-18</strong>
                    </div>
                    <div class="metric-card">
                        <span>Phase</span>
                        <strong th:text="${prediction.phase.label}">Follicular</strong>
                    </div>
                </div>
            </div>
            <div class="surface">
                <div class="section-title">
                    <i data-lucide="history"></i>
                    Cycle history
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Start date</th>
                            <th>Cycle length</th>
                            <th>Period duration</th>
                            <th>Notes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cycle : ${cycles}">
                            <td th:text="${cycle.lastPeriodStartDate}">2026-06-01</td>
                            <td th:text="${cycle.averageCycleLength + ' days'}">28 days</td>
                            <td th:text="${cycle.averagePeriodDuration + ' days'}">5 days</td>
                            <td th:text="${cycle.notes}">-</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(cycles)}">
                            <td colspan="4" class="text-secondary">No cycle entries yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</html>

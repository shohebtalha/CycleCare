<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Symptoms', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <div class="eyebrow">Symptom tracking</div>
            <h1>Daily physical symptoms</h1>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="surface h-100">
                <form th:action="@{/symptoms}" th:object="${symptomDto}" method="post" class="vstack gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div>
                        <label class="form-label" for="entryDate">Date</label>
                        <input id="entryDate" th:field="*{entryDate}" type="date" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{entryDate}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="type">Symptom</label>
                        <select id="type" th:field="*{type}" class="form-select" required>
                            <option value="">Select</option>
                            <option th:each="type : ${symptomTypes}" th:value="${type}" th:text="${type.label}">Cramps</option>
                        </select>
                        <div class="invalid-copy" th:errors="*{type}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="customSymptom">Custom symptom</label>
                        <input id="customSymptom" th:field="*{customSymptom}" class="form-control">
                        <div class="invalid-copy" th:errors="*{customSymptom}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="severity">Severity</label>
                        <input id="severity" th:field="*{severity}" type="range" min="1" max="5" class="form-range">
                        <div class="invalid-copy" th:errors="*{severity}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="notes">Notes</label>
                        <textarea id="notes" th:field="*{notes}" class="form-control" rows="3"></textarea>
                        <div class="invalid-copy" th:errors="*{notes}"></div>
                    </div>
                    <button class="btn btn-primary" type="submit">
                        <i data-lucide="plus"></i>
                        Add symptom
                    </button>
                </form>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="surface">
                <div class="section-title">
                    <i data-lucide="list-checks"></i>
                    Symptom history
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Date</th>
                            <th>Symptom</th>
                            <th>Severity</th>
                            <th>Notes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="symptom : ${symptoms}">
                            <td th:text="${symptom.entryDate}">2026-06-22</td>
                            <td>
                                <span th:text="${symptom.type.label}">Cramps</span>
                                <span class="text-secondary" th:if="${symptom.customSymptom}" th:text="${' - ' + symptom.customSymptom}"></span>
                            </td>
                            <td>
                                <span class="badge text-bg-light" th:text="${symptom.severity + '/5'}">2/5</span>
                            </td>
                            <td th:text="${symptom.notes}">-</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(symptoms)}">
                            <td colspan="4" class="text-secondary">No symptoms logged yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Moods', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <div class="eyebrow">Mood tracking</div>
            <h1>Daily emotional state</h1>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="surface h-100">
                <form th:action="@{/moods}" th:object="${moodDto}" method="post" class="vstack gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div>
                        <label class="form-label" for="entryDate">Date</label>
                        <input id="entryDate" th:field="*{entryDate}" type="date" class="form-control" required>
                        <div class="invalid-copy" th:errors="*{entryDate}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="type">Mood</label>
                        <select id="type" th:field="*{type}" class="form-select" required>
                            <option value="">Select</option>
                            <option th:each="type : ${moodTypes}" th:value="${type}" th:text="${type.label}">Calm</option>
                        </select>
                        <div class="invalid-copy" th:errors="*{type}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="intensity">Intensity</label>
                        <input id="intensity" th:field="*{intensity}" type="range" min="1" max="5" class="form-range">
                        <div class="invalid-copy" th:errors="*{intensity}"></div>
                    </div>
                    <div>
                        <label class="form-label" for="notes">Notes</label>
                        <textarea id="notes" th:field="*{notes}" class="form-control" rows="3"></textarea>
                        <div class="invalid-copy" th:errors="*{notes}"></div>
                    </div>
                    <button class="btn btn-primary" type="submit">
                        <i data-lucide="plus"></i>
                        Add mood
                    </button>
                </form>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="surface">
                <div class="section-title">
                    <i data-lucide="trending-up"></i>
                    Mood history
                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Date</th>
                            <th>Mood</th>
                            <th>Intensity</th>
                            <th>Notes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="mood : ${moods}">
                            <td th:text="${mood.entryDate}">2026-06-22</td>
                            <td th:text="${mood.type.label}">Calm</td>
                            <td><span class="badge text-bg-light" th:text="${mood.intensity + '/5'}">3/5</span></td>
                            <td th:text="${mood.notes}">-</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(moods)}">
                            <td colspan="4" class="text-secondary">No moods logged yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</html>

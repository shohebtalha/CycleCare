<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Register', ~{::section})}">
<section class="auth-wrap">
    <div class="auth-panel">
        <div class="mb-4">
            <div class="eyebrow">Start tracking</div>
            <h1>Create your account</h1>
        </div>
        <form th:action="@{/register}" th:object="${registrationDto}" method="post" class="vstack gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label class="form-label" for="name">Name</label>
                <input id="name" th:field="*{name}" class="form-control" required>
                <div class="invalid-copy" th:errors="*{name}"></div>
            </div>
            <div>
                <label class="form-label" for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" class="form-control" required>
                <div class="invalid-copy" th:errors="*{email}"></div>
            </div>
            <div>
                <label class="form-label" for="password">Password</label>
                <input id="password" th:field="*{password}" type="password" class="form-control" required>
                <div class="invalid-copy" th:errors="*{password}"></div>
            </div>
            <div>
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" class="form-control" required>
                <div class="invalid-copy" th:errors="*{confirmPassword}"></div>
                <div class="invalid-copy" th:errors="*{passwordMatching}"></div>
            </div>
            <button class="btn btn-primary btn-lg" type="submit">
                <i data-lucide="user-plus"></i>
                Register
            </button>
        </form>
        <p class="mt-4 mb-0 text-secondary">Already registered? <a th:href="@{/login}">Sign in</a>.</p>
    </div>
</section>
</html>

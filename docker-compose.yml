services:
  mysql:
    image: mysql:8.4
    container_name: cyclecare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: cyclecare
    ports:
      - "3306:3306"
    volumes:
      - cyclecare_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pchange_me"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  cyclecare_mysql_data:
